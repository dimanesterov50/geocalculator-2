<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Компрессионное сжатие талого грунта — ступени нагрузки</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            padding: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><g fill="none" stroke="%23002f4b" stroke-opacity="0.07" stroke-width="2"><circle cx="30" cy="40" r="9"/><circle cx="80" cy="90" r="7"/><circle cx="105" cy="50" r="8"/><path d="M50 75 L58 88 M42 82 L50 95" stroke-width="2.8"/><path d="M90 30 L98 45" stroke-width="2.2"/></g><g fill="%23e3f2fd" fill-opacity="0.09"><circle cx="20" cy="110" r="5"/><circle cx="75" cy="25" r="4"/></g></svg>');
            background-repeat: repeat;
            background-size: 140px;
            min-height: 100vh;
        }
        .top-menu {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .top-menu button {
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #2c3e50;
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .top-menu button:hover {
            background-color: #34495e;
        }
        .header-text {
            max-width: 800px;
            margin: 0 auto 30px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .header-text h1 {
            font-size: 24px;
            color: #2c3e50;
        }
        .header-text p {
            font-size: 16px;
            color: #000000;
        }
        .calc-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 620px;
            margin: 0 auto;
        }
        .calculation-container {
            border: 2px solid #2c3e50;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: rgba(255,255,255,0.92);
            min-width: 500px;
            max-width: 620px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 14px;
            color: #2c3e50;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        .result-block {
            margin-top: 20px;
            padding: 15px;
            background: rgba(240,248,255,0.6);
            border: 1px solid #d0e0ff;
            border-radius: 10px;
        }
        .result-title {
            font-size: 16px;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .step-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px 10px;
        }
        .step-item {
            background: white;
            padding: 12px;
            border: 1px solid #a3c8ff;
            border-radius: 8px;
            text-align: center;
        }
        .step-item .step-num {
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
        }
        .step-item .value {
            font-size: 17px;
            font-weight: bold;
            color: #1a73e8;
        }
        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-calc-green {
            padding: 8px 20px;
            border-radius: 12px;
            border: 2px solid #2e7d32;
            background-color: #2e7d32;
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            min-width: 140px;
        }
        .btn-calc-green:hover { background-color: #388e3c; }
        .btn-clear {
            padding: 8px 20px;
            border-radius: 12px;
            border: 1px solid #7f8c8d;
            background-color: #ecf0f1;
            color: #2c3e50;
            cursor: pointer;
            font-size: 15px;
            min-width: 140px;
        }
        .btn-clear:hover { background-color: #bdc3c7; }
        .error {
            color: #c62828;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        @media screen and (max-width: 768px) {
            body { padding-top: 60px; }
            .header-text { margin-top: 20px; }
            .calc-wrapper { flex-direction: column; align-items: center; }
            .calculation-container { width: 100%; max-width: 90%; min-width: 320px; }
        }
    </style>
</head>
<body>

<div class="top-menu">
    <button onclick="location.href='https://geocalculator.ru/index.html'">🏠</button>
</div>

<div class="header-text">
    <h1>Компрессионное сжатие талого грунта</h1>
    <p>Расчёт ступеней вертикальной нагрузки в зависимости от типа грунта</p>
</div>

<div class="calc-wrapper">
    <div class="calculation-container">
        <div class="form-grid">
            <div class="form-group">
                <label>Тип грунта</label>
                <select id="soilType" onkeydown="handleEnter(event, this)">
                    <option value="пески">Пески</option>
                    <option value="глинистые">Глинистые грунты</option>
                </select>
            </div>
            <div class="form-group" id="paramLabelGroup">
                <label id="paramLabel">Коэффициент пористости e</label>
                <input type="number" id="paramValue" step="0.01" min="0" onkeydown="handleEnter(event, this)">
            </div>
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="result-block" id="resultBlock" style="display:none;">
            <div class="result-title">Ступени нагрузки, МПа</div>
            <div class="step-grid" id="stepsContainer"></div>
        </div>

        <div class="action-row">
            <button class="btn-calc-green" onclick="calculateCompression()">Рассчитать</button>
            <button class="btn-clear" onclick="clearForm()">Очистить</button>
        </div>
    </div>
</div>

<script>
// Автоматическая смена подписи поля в зависимости от типа грунта
document.getElementById('soilType').addEventListener('change', function() {
    const soil = this.value;
    const label = document.getElementById('paramLabel');
    label.textContent = soil === 'пески' ? 'Коэффициент пористости e' : 'Показатель текучести Il';
});

// Обработка Enter — переход фокуса или расчёт в последнем поле
function handleEnter(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        const inputs = Array.from(document.querySelectorAll('input, select'));
        const current = document.activeElement;
        const index = inputs.indexOf(current);

        if (index === inputs.length - 1) {
            calculateCompression();
        } else {
            inputs[index + 1].focus();
        }
    }
}

// Расчёт
function calculateCompression() {
    const soil = document.getElementById('soilType').value;
    const param = parseFloat(document.getElementById('paramValue').value);

    const err = document.getElementById('errorMsg');
    err.textContent = '';

    if (isNaN(param) || param < 0) {
        err.textContent = 'Введите корректное положительное значение';
        document.getElementById('resultBlock').style.display = 'none';
        return;
    }

    let p1;
    if (soil === 'пески') {
        if (param >= 1.0) p1 = 0.005;
        else if (param >= 0.75) p1 = 0.0125;
        else if (param > 0.6) p1 = 0.025;
        else p1 = 0.05;
    } else { // глинистые
        if (param >= 1.0) p1 = 0.005;
        else if (param >= 0.75) p1 = 0.0125;
        else if (param > 0.5) p1 = 0.025;
        else if (param > 0.25) p1 = 0.05;
        else p1 = 0.1;
    }

    const steps = [p1];
    for (let i = 1; i < 5; i++) {
        steps.push(steps[i-1] * 2);
    }

    const container = document.getElementById('stepsContainer');
    container.innerHTML = '';
    steps.forEach((v, i) => {
        const div = document.createElement('div');
        div.className = 'step-item';
        div.innerHTML = `<div class="step-num">Ступень ${i+1}</div><div class="value">${v.toFixed(3)} МПа</div>`;
        container.appendChild(div);
    });

    document.getElementById('resultBlock').style.display = 'block';
}

function clearForm() {
    document.getElementById('soilType').value = 'пески';
    document.getElementById('paramValue').value = '';
    document.getElementById('errorMsg').textContent = '';
    document.getElementById('resultBlock').style.display = 'none';
    document.getElementById('paramLabel').textContent = 'Коэффициент пористости e';
}
</script>

</body>
</html>
