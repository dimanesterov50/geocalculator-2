<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Механические испытания грунтов</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            padding: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><g fill="none" stroke="%23002f4b" stroke-opacity="0.06" stroke-width="1.8"><rect x="20" y="40" width="100" height="60" rx="4"/><circle cx="70" cy="70" r="12"/><path d="M70 58 L70 82 M58 70 L82 70" stroke-width="2"/><path d="M30 20 L110 120" stroke-opacity="0.05"/><path d="M110 20 L30 120" stroke-opacity="0.05"/><circle cx="35" cy="35" r="8" fill-opacity="0"/><circle cx="105" cy="105" r="8" fill-opacity="0"/></g></svg>');
            background-repeat: repeat;
            background-size: 140px;
            min-height: 100vh;
        }
        .top-menu {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .top-menu button {
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #2c3e50;
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .top-menu button:hover {
            background-color: #34495e;
        }
        .header-text {
            max-width: 900px;
            margin: 0 auto 40px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .header-text h1 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 12px;
        }
        .header-text p {
            font-size: 17px;
            color: #34495e;
        }
        .menu-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px auto;
            flex-wrap: wrap;
            max-width: 900px;
        }
        .menu-btn {
            padding: 16px 32px;
            border-radius: 12px;
            border: 2px solid #2c3e50;
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            min-width: 280px;
        }
        .menu-btn:hover {
            background-color: #34495e;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }
        @media screen and (max-width: 768px) {
            body { padding-top: 70px; }
            .header-text { margin-top: 20px; }
            .menu-buttons { flex-direction: column; align-items: center; gap: 16px; }
            .menu-btn { width: 90%; max-width: 380px; }
        }
    </style>
</head>
<body>

<div class="top-menu">
    <button onclick="location.href='https://geocalculator.ru/index.html'">🏠</button>
</div>

<div class="header-text">
    <h1>Механические испытания грунтов</h1>
    <p>Расчёты ступеней нагрузки для основных видов механических испытаний мерзлых грунтов</p>
</div>

<div class="menu-buttons">
    <a href="mechanics/compr.html" class="menu-btn">Компрессионное сжатие талого грунта</a>
    <a href="mechanics/compr_froz.html" class="menu-btn">Компрессионное сжатие мерзлого грунта</a>
    <a href="mechanics/shear_froz.html" class="menu-btn">Срез по поверхности смерзания</a>
</div>

</body>
</html>
